
<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoDo FF P18</title>

  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    #pitch {
      width: 90vw;
      max-width: 700px;
      aspect-ratio: 2 / 3;
      background: #43a047;
      border: 4px solid white;
      position: relative;
      overflow: hidden;
    }

    .player {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1976d2;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      touch-action: none;
    }
  </style>
</head>

<body>

  <div id="pitch">
    <div class="player"></div>
  </div>

</body>
</html>
