<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MoDo FF P18</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app">
<div class="toolbar">
  <button id="addBlue">+ Blå</button>
  <button id="addRed">+ Röd</button>
  <button id="addCone">+ Kona</button>
  <button id="drawPass">Passning</button>
</div>
    <svg viewBox="0 0 20 30">

      <defs>
        <pattern id="grass" width="20" height="3" patternUnits="userSpaceOnUse">
          <rect width="20" height="1.5" fill="#55aa35" />
          <rect y="1.5" width="20" height="1.5" fill="#4fa332" />
        </pattern>
      </defs>

      <!-- Gräs -->
      <rect x="0" y="0" width="20" height="30" fill="url(#grass)" />

      <!-- Ytterlinje -->
      <rect x="0.2" y="0.2" width="19.6" height="29.6" class="field-line" />

      <!-- Mittlinje -->
      <line x1="0.2" y1="15" x2="19.8" y2="15" class="field-line" />

      <!-- Mittcirkel -->
      <circle cx="10" cy="15" r="2.6" class="field-line" />
      <circle cx="10" cy="15" r="0.12" fill="white" />

      <!-- Övre straffområde -->
      <rect x="4.2" y="0.2" width="11.6" height="4.8" class="field-line" />

      <!-- Övre målområde -->
      <rect x="7" y="0.2" width="6" height="1.9" class="field-line" />

      <!-- Övre straffpunkt -->
      <circle cx="10" cy="3.5" r="0.1" fill="white" />

      <!-- Övre båge -->
      <path
        d="M 7.8 5
           A 2.2 2.2 0 0 0 12.2 5"
        class="field-line"
      />

      <!-- Nedre straffområde -->
      <rect x="4.2" y="25" width="11.6" height="4.8" class="field-line" />

      <!-- Nedre målområde -->
      <rect x="7" y="27.9" width="6" height="1.9" class="field-line" />

      <!-- Nedre straffpunkt -->
      <circle cx="10" cy="26.5" r="0.1" fill="white" />

      <!-- Nedre båge -->
      <path
        d="M 7.8 25
           A 2.2 2.2 0 0 1 12.2 25"
        class="field-line"
      />

      <!-- Hörn -->
      <path d="M 0.2 1 A 0.8 0.8 0 0 0 1 0.2" class="field-line" />
      <path d="M 19 0.2 A 0.8 0.8 0 0 0 19.8 1" class="field-line" />
      <path d="M 0.2 29 A 0.8 0.8 0 0 0 1 29.8" class="field-line" />
      <path d="M 19 29.8 A 0.8 0.8 0 0 0 19.8 29" class="field-line" />

      <!-- Övre mål -->
      <g transform="translate(8.5,-0.45)">
        <rect width="3" height="0.45" class="goal" />

        <line x1="0.5" y1="0" x2="0.5" y2="0.45" class="net" />
        <line x1="1" y1="0" x2="1" y2="0.45" class="net" />
        <line x1="1.5" y1="0" x2="1.5" y2="0.45" class="net" />
        <line x1="2" y1="0" x2="2" y2="0.45" class="net" />
        <line x1="2.5" y1="0" x2="2.5" y2="0.45" class="net" />

        <line x1="0" y1="0.22" x2="3" y2="0.22" class="net" />
      </g>

      <!-- Nedre mål -->
      <g transform="translate(8.5,30)">
        <rect width="3" height="0.45" class="goal" />

        <line x1="0.5" y1="0" x2="0.5" y2="0.45" class="net" />
        <line x1="1" y1="0" x2="1" y2="0.45" class="net" />
        <line x1="1.5" y1="0" x2="1.5" y2="0.45" class="net" />
        <line x1="2" y1="0" x2="2" y2="0.45" class="net" />
        <line x1="2.5" y1="0" x2="2.5" y2="0.45" class="net" />

        <line x1="0" y1="0.22" x2="3" y2="0.22" class="net" />
      </g>


    </svg>

  </div>

  <script src="app.js"></script>

</body>
</html>
